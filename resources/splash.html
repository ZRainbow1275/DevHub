<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevHub</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 400px;
    height: 300px;
    overflow: hidden;
    background: transparent;
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    -webkit-app-region: drag;
    user-select: none;
  }

  .container {
    width: 100%;
    height: 100%;
    background: #1a1814;
    border: 2px solid #d64545;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Diagonal stripes decoration */
  .container::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 10px,
      rgba(214, 69, 69, 0.04) 10px,
      rgba(214, 69, 69, 0.04) 11px
    );
    pointer-events: none;
  }

  /* Top-right triangle */
  .corner-mark {
    position: absolute;
    top: 0;
    right: 0;
    width: 24px;
    height: 24px;
    background: #d64545;
    clip-path: polygon(0 0, 100% 0, 100% 100%);
  }

  /* Bottom-left triangle */
  .corner-mark-bl {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 24px;
    height: 24px;
    background: #c9a227;
    clip-path: polygon(0 0, 0 100%, 100% 100%);
  }

  .logo-section {
    text-align: center;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  .logo-text {
    font-size: 28px;
    font-weight: 700;
    color: #f0e8d8;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace;
  }

  .logo-sub {
    font-size: 10px;
    color: #c9a227;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 6px;
    font-weight: 400;
  }

  .logo-line {
    width: 60px;
    height: 2px;
    background: #d64545;
    margin: 10px auto 0;
  }

  .progress-section {
    width: 300px;
    position: relative;
    z-index: 1;
  }

  .progress-bar-bg {
    width: 100%;
    height: 4px;
    background: #2a2520;
    position: relative;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #d64545, #c9a227);
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-text {
    margin-top: 12px;
    font-size: 12px;
    color: #a09888;
    text-align: center;
    min-height: 18px;
    letter-spacing: 0.05em;
  }

  .progress-percent {
    margin-top: 6px;
    font-size: 11px;
    color: #6a6050;
    text-align: center;
    font-family: 'JetBrains Mono', 'Consolas', monospace;
  }

  /* Fade out animation */
  .fade-out {
    animation: fadeOut 200ms ease-out forwards;
  }

  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
</style>
</head>
<body>
<div class="container" id="splash-container">
  <div class="corner-mark"></div>
  <div class="corner-mark-bl"></div>

  <div class="logo-section">
    <div class="logo-text">DevHub</div>
    <div class="logo-sub">Development Control Center</div>
    <div class="logo-line"></div>
  </div>

  <div class="progress-section">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="progress-text" id="progress-text">Initializing...</div>
    <div class="progress-percent" id="progress-percent">0%</div>
  </div>
</div>

<script>
  const progressFill = document.getElementById('progress-fill');
  const progressText = document.getElementById('progress-text');
  const progressPercent = document.getElementById('progress-percent');
  const container = document.getElementById('splash-container');

  // Listen for progress updates from main process
  if (window.splashBridge) {
    window.splashBridge.onProgress(function(data) {
      if (progressFill) progressFill.style.width = data.percent + '%';
      if (progressText) progressText.textContent = data.text || '';
      if (progressPercent) progressPercent.textContent = data.percent + '%';
    });

    window.splashBridge.onFadeOut(function() {
      if (container) {
        container.classList.add('fade-out');
      }
    });
  }
</script>
</body>
</html>
